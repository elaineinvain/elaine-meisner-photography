<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elaine Meisner</title>
  <style>
    @font-face {
      font-family: 'Special Gothic Condensed One';
      src: url('fonts/SpecialGothicCondensedOne-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Geologica';
      src: url('fonts/Geologica-VariableFont_CRSV,SHRP,slnt,wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Special Gothic Condensed One', sans-serif;
      --body-font: 'Geologica', sans-serif;
      --ink: rgb(220,50,35);
    }

    html {
      width: 100%; height: 100%;
    }

    body {
      width: 100%; height: 100%;
      /* background.jpg fills entire body — JS adds the url() once confirmed */
      background-color: #faf9f7;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: var(--ink);
      overflow: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 99999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
      pointer-events: none;
    }
    nav a {
      font-family: var(--font);
      font-size: 32px;
      letter-spacing: 0.03em;
      text-transform: lowercase;
      text-decoration: none;
      color: var(--ink);
      pointer-events: all;
      cursor: pointer;
      opacity: 1;
    }
    nav .home { font-size: 32px; }

    /* ── LOADER ── */
    #loader {
      position: fixed; inset: 0;
      z-index: 999999;
      background: #000;
      cursor: default;
      overflow: hidden;
    }
    #loader.clickable { cursor: pointer; }
    #loader-img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #loader-title {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font);
      font-size: clamp(32px, 6vw, 80px);
      letter-spacing: 0.04em;
      text-transform: lowercase;
      /* pure white — mix-blend-mode:difference makes it always visible */
      color: #fff;
      mix-blend-mode: difference;
      pointer-events: none; user-select: none;
    }
    #loader-hint {
      position: absolute;
      bottom: 40px; left: 0; right: 0;
      text-align: center;
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      /* identical treatment to title so colour is always the same */
      color: #fff;
      mix-blend-mode: difference;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    #loader-hint.visible { opacity: 1; }
    #loader.fade-out { transition: opacity 0.5s ease; opacity: 0; pointer-events: none; }

    /* ── CANVAS ── */
    #canvas { position: fixed; inset: 0; }

    /* ── PHOTO SYSTEM ──
       .photo-wrap  → positioned absolutely, carries the rotation (never animated)
       .photo-inner → child, carries drop-in animation (no rotation = no conflict)
    ── */
    .photo-wrap {
      position: absolute;
      cursor: grab;
      user-select: none;
    }
    .photo-wrap:active { cursor: grabbing; }

    .photo-inner {
      width: 100%; height: 100%;
      border-radius: 1px;
      overflow: hidden;
      background: #e8e5df;
      box-shadow: 3px 3px 2px rgba(0,0,0,.20), 6px 6px 6px rgba(0,0,0,.12);
      transition: box-shadow 0.2s ease;
      /* start hidden; JS sets animation-delay then triggers via class */
      opacity: 0;
    }
    .photo-inner.animate {
      animation: dropIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .photo-inner.lifted {
      box-shadow: 5px 5px 3px rgba(0,0,0,.22), 10px 10px 8px rgba(0,0,0,.14);
    }
    .photo-inner img {
      display: block; width: 100%; height: 100%;
      object-fit: cover; pointer-events: none;
      filter: saturate(0.88) brightness(1.02);
    }

    /* ── MOBILE STACK ── */
    #mobile-stack {
      display: none;
      position: fixed;
      top: 52px;
      left: 0; right: 0; bottom: 0;
      align-items: flex-start;
      justify-content: center;
      padding-top: 12px;
      overflow: hidden;
      pointer-events: none;
    }

    #card-stack {
      position: relative;
      width: 88vw;
      max-width: 380px;
      pointer-events: all;
      flex-shrink: 0;
    }

    #stack-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: all;
      width: 100%;
    }

    /* Swipe hint — fixed at bottom of screen */
    #swipe-hint {
      position: fixed;
      bottom: 28px;
      left: 0; right: 0;
      text-align: center;
      font-family: var(--font);
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: var(--ink);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 99998;
    }

    #swipe-hint.visible { opacity: 1; }
    #swipe-hint.hidden  { opacity: 0; }

    .stack-card {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      border-radius: 2px;
      overflow: hidden;
      background: transparent;
      user-select: none;
      touch-action: pan-y;
      will-change: transform;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    .stack-card img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      filter: saturate(0.88) brightness(1.02);
      -webkit-user-drag: none;
      box-shadow: 3px 3px 2px rgba(0,0,0,.22), 6px 6px 8px rgba(0,0,0,.14);
      border-radius: 2px;
    }

    @media (max-width: 700px) {
      #canvas { display: none; }
      #mobile-stack { display: flex; }
      nav { position: static; padding: 20px 12px; }
      nav a { font-size: 20px; }
      nav .home { font-size: 20px; }
    }
  </style>
</head>
<body>

  <div id="loader">
    <img id="loader-img" src="" alt="">
    <div id="loader-title">elaine meisner</div>
    <div id="loader-hint">click anywhere to enter</div>
  </div>

  <nav>
    <a id="nav-home" class="home">elaine meisner</a>
    <a href="about.html">about</a>
  </nav>

  <div id="canvas"></div>
  <div id="mobile-stack">
    <div id="stack-wrapper">
      <div id="card-stack"></div>
    </div>
  </div>
  <div id="swipe-hint">← swipe →</div>

  <script>
    /* ── background.jpg ──────────────────────────────────────────────────── */
    (function () {
      const img = new Image();
      img.onload = () => { document.body.style.backgroundImage = "url('images/background.jpg')"; };
      img.src = 'images/background.jpg';
    })();

    /* ── Loader ──────────────────────────────────────────────────────────── */
    (function () {
      const loader = document.getElementById('loader');
      const loaderImg = document.getElementById('loader-img');
      const hint = document.getElementById('loader-hint');

      // Von about-Seite kommend: Loader sofort überspringen, Fotos direkt animieren
      if (sessionStorage.getItem('skipLoader')) {
        sessionStorage.removeItem('skipLoader');
        loader.remove();
        window.addEventListener('photosReady', function () {
          window.startPhotoAnimation();
        }, { once: true });
        return;
      }

      // Fresh load — clear saved layout so photos get new random positions
      sessionStorage.removeItem('photoLayout');

      let canClose = false, timer, slides = [], idx = 0, interval = 1000;

      function tick() {
        loaderImg.src = slides[idx++ % slides.length];
        interval = Math.max(333, interval * 0.91);
        timer = setTimeout(tick, interval);
      }

      function loadSlides(i) {
        const t = new Image();
        const isMobile = window.innerWidth <= 700;
        t.onload  = () => {
          // Skip slide2 on mobile
          if (!(isMobile && i === 2)) slides.push('images/slide' + i + '.jpg');
          loadSlides(i + 1);
        };
        t.onerror = () => { slides.length ? tick() : loader.remove(); };
        t.src = 'images/slide' + i + '.jpg';
      }

      setTimeout(() => {
        canClose = true;
        loader.classList.add('clickable');
        hint.classList.add('visible');
      }, 3000);

      loader.addEventListener('click', () => {
        if (!canClose) return;
        clearTimeout(timer);
        loader.classList.add('fade-out');
        setTimeout(() => loader.remove(), 500);
        window.startPhotoAnimation();
      });

      loadSlides(1);
    })();

    /* ── Nav home — nur scrollen, nie neu laden ──────────────────────────── */
    document.getElementById('nav-home').addEventListener('click', (e) => {
      e.preventDefault();
      // Falls wir auf einer anderen Seite sind, normal navigieren
      // Auf index.html: nur nach oben scrollen, kein Reload
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    /* ── Photos ──────────────────────────────────────────────────────────── */
    // Bilder werden sofort still geladen, aber erst nach Loader-Klick animiert
    const SCALES = [0.88, 0.92, 0.96, 1.0, 1.04, 1.08];
    const canvas = document.getElementById('canvas');
    let topZ = 200;
    const pendingWraps = []; // sammelt alle Wrap-Elemente vor dem Start
    let animationStarted = false;

    function sr(s) { const x = Math.sin(s + 1) * 1e4; return x - Math.floor(x); }
    function toFront(wrap) { wrap.style.zIndex = Math.min(++topZ, 99990); }

    // Startet die staggered Animation für alle bereits geladenen Bilder (nur Desktop)
    window.startPhotoAnimation = function () {
      if (animationStarted) return;
      if (window.innerWidth <= 700) { animationStarted = true; return; } // skip on mobile
      animationStarted = true;
      pendingWraps.forEach((inner, i) => {
        inner.style.animationDelay = (i * 120) + 'ms';
        requestAnimationFrame(() => {
          requestAnimationFrame(() => { inner.classList.add('animate'); });
        });
      });
    };

    // Falls Loader schon entfernt wurde (skipLoader), sofort starten
    window.dispatchEvent(new Event('photosReady'));

    const mobileSources = [];

    // Load saved layout from sessionStorage if returning from about page
    const savedLayout = (function() {
      try { return JSON.parse(sessionStorage.getItem('photoLayout') || 'null'); } catch(e) { return null; }
    })();
    const layoutMap = {}; // src -> {left, top, w, h, zIndex}
    if (savedLayout) {
      savedLayout.forEach(p => { layoutMap[p.src] = p; });
    }

    (function load(i) {
      i++;
      const src = `images/image${i}.jpg`;
      const t = new Image();
      t.onerror = () => {};
      t.onload  = () => {
        const n     = i;
        const scale = SCALES[Math.floor(sr(n * 7 + 4) * SCALES.length)];
        const aspect = t.naturalHeight / t.naturalWidth;
        const isLandscape = aspect < 1;
        const baseW = isLandscape ? 420 : 280;
        const w     = Math.round(baseW * scale);
        const h     = Math.round(w * aspect);
        const vw    = window.innerWidth;
        const vh    = window.innerHeight;

        // Use saved position if available, otherwise generate new random position
        const saved = layoutMap[src];
        const left  = saved ? saved.left : (Math.random() * (vw + w * 0.6) - w * 0.3);
        const top   = saved ? saved.top  : (Math.random() * (vh + h * 0.4) - h * 0.2);
        const zIdx  = saved ? saved.zIndex : n;

        const wrap = document.createElement('div');
        wrap.className       = 'photo-wrap';
        wrap.style.zIndex    = zIdx;
        wrap.style.left      = left + 'px';
        wrap.style.top       = top  + 'px';
        wrap.style.width     = w + 'px';
        wrap.style.height    = h + 'px';
        wrap.dataset.src     = src; // for saving later

        const inner = document.createElement('div');
        inner.className = 'photo-inner';

        const img = document.createElement('img');
        img.src = src; img.draggable = false;
        inner.appendChild(img);
        wrap.appendChild(inner);

        makeDraggable(wrap, inner);
        canvas.appendChild(wrap);
        pendingWraps.push(inner);

        if (animationStarted) {
          inner.style.animationDelay = '0ms';
          requestAnimationFrame(() => {
            requestAnimationFrame(() => { inner.classList.add('animate'); });
          });
        }

        mobileSources.push(src);
        load(i);
      };
      t.onerror = () => {
        if (window.innerWidth <= 700) window.buildMobileStack(mobileSources);
        // Save current layout to sessionStorage once all photos are placed
        saveLayout();
      };
      t.src = src;
    })(0);

    function saveLayout() {
      try {
        const wraps = document.querySelectorAll('.photo-wrap');
        const layout = Array.from(wraps).map(w => ({
          src:    w.dataset.src,
          left:   parseFloat(w.style.left),
          top:    parseFloat(w.style.top),
          zIndex: parseInt(w.style.zIndex)
        }));
        sessionStorage.setItem('photoLayout', JSON.stringify(layout));
      } catch(e) {}
    }

    // Save layout periodically so moved photos are remembered too
    setInterval(saveLayout, 3000);

    // On mobile: also start parallel preload of all images right away
    // so we don't wait for sequential loading
    if (window.innerWidth <= 700) {
      (function parallelPreload() {
        const FIRST_BATCH = 20; // show stack with first 20 images quickly
        const MAX = 300;
        const firstBatch = [];
        const allImages = [];
        let firstChecked = 0;
        let allChecked = 0;
        let stackBuilt = false;

        for (let j = 1; j <= MAX; j++) {
          (function(n) {
            const pt = new Image();
            const src = `images/image${n}.jpg`;

            pt.onload = () => {
              allImages.push({ n, src });

              if (n <= FIRST_BATCH) {
                firstBatch.push({ n, src });
                firstChecked++;
                if (firstChecked === FIRST_BATCH && !stackBuilt) {
                  stackBuilt = true;
                  // Shuffle first batch randomly
                  const srcs = firstBatch.map(x => x.src);
                  for (let k = srcs.length - 1; k > 0; k--) {
                    const m = Math.floor(Math.random() * (k + 1));
                    [srcs[k], srcs[m]] = [srcs[m], srcs[k]];
                  }
                  window.buildMobileStack(srcs);
                }
              }

              allChecked++;
              if (allChecked === MAX) {
                // Shuffle remaining before appending
                const remaining = allImages
                  .filter(x => x.n > FIRST_BATCH)
                  .map(x => x.src);
                for (let k = remaining.length - 1; k > 0; k--) {
                  const m = Math.floor(Math.random() * (k + 1));
                  [remaining[k], remaining[m]] = [remaining[m], remaining[k]];
                }
                window.appendToStack && window.appendToStack(remaining);
              }
            };

            pt.onerror = () => {
              if (n <= FIRST_BATCH) {
                firstChecked++;
                if (firstChecked === FIRST_BATCH && !stackBuilt) {
                  stackBuilt = true;
                  const srcs = firstBatch.map(x => x.src);
                  for (let k = srcs.length - 1; k > 0; k--) {
                    const m = Math.floor(Math.random() * (k + 1));
                    [srcs[k], srcs[m]] = [srcs[m], srcs[k]];
                  }
                  window.buildMobileStack(srcs);
                }
              }
              allChecked++;
              if (allChecked === MAX && !stackBuilt) {
                stackBuilt = true;
                const srcs = allImages.map(x => x.src);
                for (let k = srcs.length - 1; k > 0; k--) {
                  const m = Math.floor(Math.random() * (k + 1));
                  [srcs[k], srcs[m]] = [srcs[m], srcs[k]];
                }
                window.buildMobileStack(srcs);
              }
            };

            pt.src = src;
          })(j);
        }
      })();
    }

    // Silently append more images to the bottom of the stack after initial build
    window.appendToStack = function(sources) {
      if (!ready || !stackEl) return;
      // Shuffle the new sources
      for (let i = sources.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [sources[i], sources[j]] = [sources[j], sources[i]];
      }
      sources.forEach((src, idx) => {
        const t = new Image();
        t.onload = () => {
          const landscape = t.naturalWidth > t.naturalHeight;
          const i = cards.length + idx;
          const rot = parseFloat((sr(i * 13 + 7) < 0.25 ? 0 : (sr(i * 7 + 3) * 8 - 4)).toFixed(1));
          const scaleArr = [0.90, 0.93, 0.96, 1.0, 1.03, 1.06];
          const scale = scaleArr[Math.floor(sr(i * 5 + 2) * scaleArr.length)];
          const baseW = landscape ? 360 : 310;
          const w = Math.round(baseW * scale);

          const card = document.createElement('div');
          card.className = 'stack-card';
          card.dataset.rot = rot;
          card.dataset.landscape = landscape ? '1' : '0';
          card.style.width = w + 'px';
          const yPos = (VISIBLE - 1) * Y_STEP;
          card.style.transform = `translateY(${yPos}px) rotate(${rot}deg)`;
          card.dataset.baseY = yPos;
          card.style.opacity = '0'; // invisible at bottom
          card.style.zIndex = '1';

          const img = document.createElement('img');
          img.src = src; img.draggable = false;
          if (landscape && stackEl.querySelector('[data-landscape="0"]')) {
            const h = stackEl.querySelector('[data-landscape="0"]').offsetHeight;
            if (h) {
              card.style.height = h + 'px';
              img.style.position = 'absolute';
              img.style.top = '50%';
              img.style.left = '0';
              img.style.width = '100%';
              img.style.height = 'auto';
              img.style.transform = 'translateY(-50%)';
            }
          }
          card.appendChild(img);
          stackEl.appendChild(card);
          cards.push(card); // add to end of array
        };
        t.src = src;
      });
    };

    // ── Mobile card stack (Tinder-style) ─────────────────────────────────
    const stackEl  = document.getElementById('card-stack');
    let   cards    = [];   // [0] = top card
    let   ready    = false;
    const VISIBLE  = 5;    // how many cards show from the stack
    const Y_STEP   = 10;   // px offset per layer — makes stack look thick
    const S_STEP   = 0.04; // scale reduction per layer

    if (stackEl) { stackEl.style.opacity = '0'; }

    window.buildMobileStack = function (sources) {
      if (window.innerWidth > 700 || !stackEl) return;
      if (ready) return; // built once, never rebuild

      // Fisher-Yates shuffle for random order
      const shuffled = [...sources];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }

      // Reorder: max 2 consecutive landscape images
      // We need to know each image's orientation first — preload metadata
      let loaded = 0;
      const meta = shuffled.map(() => ({ landscape: false }));

      shuffled.forEach((src, i) => {
        const t = new Image();
        t.onload = () => {
          meta[i].landscape = t.naturalWidth > t.naturalHeight;
          loaded++;
          if (loaded === shuffled.length) buildWithMeta(shuffled, meta);
        };
        t.onerror = () => { loaded++; if (loaded === shuffled.length) buildWithMeta(shuffled, meta); };
        t.src = src;
      });
    };

    function buildWithMeta(sources, meta) {
      // Reorder to ensure max 2 consecutive landscape
      const reordered = [...sources.map((src, i) => ({ src, landscape: meta[i].landscape }))];
      let consecutiveLandscape = 0;
      for (let i = 0; i < reordered.length; i++) {
        if (reordered[i].landscape) {
          consecutiveLandscape++;
          if (consecutiveLandscape > 2) {
            // Find next portrait and swap
            for (let j = i + 1; j < reordered.length; j++) {
              if (!reordered[j].landscape) {
                [reordered[i], reordered[j]] = [reordered[j], reordered[i]];
                consecutiveLandscape = 0;
                break;
              }
            }
          }
        } else {
          consecutiveLandscape = 0;
        }
      }

      // Random rotations — some straight (0), most slightly tilted
      const rotations = reordered.map(() => {
        if (Math.random() < 0.25) return 0;
        return parseFloat(((Math.random() * 8) - 4).toFixed(1));
      });

      // Size scales — slight variation
      const scales = reordered.map((_, i) => {
        const s = [0.90, 0.93, 0.96, 1.0, 1.03, 1.06];
        return s[Math.floor(sr(i * 5 + 2) * s.length)];
      });

      // Build cards
      reordered.forEach(({ src, landscape }, i) => {
        const card = document.createElement('div');
        card.className = 'stack-card';
        card.dataset.rot = rotations[i];
        card.dataset.landscape = landscape ? '1' : '0';

        const baseW = landscape ? 360 : 310;
        const w = Math.round(baseW * scales[i]);
        card.style.width = w + 'px';

        // Permanent Y position — set once, never changes
        const yPos = Math.min(i, VISIBLE - 1) * Y_STEP;
        card.style.transform = `translateY(${yPos}px) rotate(${rotations[i]}deg)`;
        card.dataset.baseY = yPos;

        const img = document.createElement('img');
        img.src = src; img.draggable = false;
        card.appendChild(img);
        stackEl.appendChild(card);
        cards.push(card);
      });

      // Wait for top card to render, lock height, show
      const topImg = cards[0].querySelector('img');
      function init() {
        const portraitCard = cards.find(c => c.dataset.landscape === '0') || cards[0];
        const h = portraitCard.offsetHeight;
        if (!h) { requestAnimationFrame(init); return; }

        cards.forEach(card => {
          if (card.dataset.landscape === '1') {
            card.style.height = h + 'px';
            card.style.overflow = 'hidden';
            const img = card.querySelector('img');
            if (img) {
              img.style.position = 'absolute';
              img.style.top = '50%';
              img.style.left = '0';
              img.style.width = '100%';
              img.style.height = 'auto';
              img.style.transform = 'translateY(-50%)';
            }
          }
        });

        stackEl.style.height = h + 'px';
        stackEl.style.overflow = 'visible'; // let depth cards show below
        positionAll(false);
        stackEl.style.transition = 'opacity 0.4s ease';
        stackEl.style.opacity = '1';
        ready = true;
        attachDrag();

        // Show swipe hint if first visit
        const hint = document.getElementById('swipe-hint');
        if (hint && !sessionStorage.getItem('swipedOnce')) {
          setTimeout(() => hint.classList.add('visible'), 600);
        }
      }
      topImg.complete ? requestAnimationFrame(init)
                      : topImg.addEventListener('load', () => requestAnimationFrame(init));
    }

    function positionAll(animate) {
      // Only update z-index and opacity — never move cards
      cards.forEach((card, i) => {
        const visible = i < VISIBLE;
        card.style.transition = 'opacity 0.3s ease';
        card.style.zIndex     = cards.length - i;
        card.style.opacity    = visible ? '1' : '0';
      });
    }

    function attachDrag() {
      let active = false, startX = 0, moveX = 0;
      let undoMode = false;
      let undoCard = null;
      const history = [];
      window._mobileHistory = history; // expose for rebuild check

      stackEl.addEventListener('touchstart', e => {
        if (!ready) return;
        if (cards.length === 0 && history.length === 0) return;
        active = true;
        startX = e.touches[0].clientX;
        moveX  = 0;
        undoMode = false;
        undoCard = null;
        cards[0].style.transition = 'none';
        // Hide swipe hint on first interaction
        const hint = document.getElementById('swipe-hint');
        if (hint) {
          hint.classList.remove('visible');
          sessionStorage.setItem('swipedOnce', '1');
        }
      }, { passive: true });

      stackEl.addEventListener('touchmove', e => {
        if (!active) return;
        moveX = e.touches[0].clientX - startX;

        if (moveX > 0 && history.length > 0) {
          // RIGHT swipe — undo mode
          if (!undoMode) {
            undoMode = true;
            undoCard = history[history.length - 1];
            // Freeze top card
            if (cards[0]) {
              cards[0].style.transition = 'none';
              const rot0  = parseFloat(cards[0].dataset.rot || 0);
              const baseY0 = parseFloat(cards[0].dataset.baseY || 0);
              cards[0].style.transform = `translate3d(0,${baseY0}px,0) rotate(${rot0}deg)`;
            }
            // Place undo card off-screen left in px
            const offscreen = -(window.innerWidth * 1.2);
            undoCard.style.transition = 'none';
            undoCard.style.opacity    = '1';
            undoCard.style.zIndex     = cards.length + 1;
            const undoRot = parseFloat(undoCard.dataset.rot || 0);
            undoCard.style.transform  = `translate3d(${offscreen}px,0,0) rotate(${undoRot - 22}deg)`;
          }
          // Drag undo card in — directly follow finger
          const offscreen = -(window.innerWidth * 1.2);
          const undoRot = parseFloat(undoCard.dataset.rot || 0);
          const dragX = offscreen + moveX * (window.innerWidth * 1.2 / (window.innerWidth * 0.4));
          const clampedX = Math.min(dragX, 0);
          const progress = Math.max(0, 1 - Math.abs(clampedX) / Math.abs(offscreen));
          const rot = undoRot - 22 + 22 * progress;
          undoCard.style.transform = `translate3d(${clampedX}px,0,0) rotate(${rot}deg)`;

        } else if (!undoMode) {
          // LEFT swipe — normal, move top card
          const baseRot = parseFloat(cards[0].dataset.rot || 0);
          const baseY   = parseFloat(cards[0].dataset.baseY || 0);
          const rot = baseRot + moveX * 0.05;
          cards[0].style.transform = `translate3d(${moveX}px,${baseY}px,0) rotate(${rot}deg)`;
        }
      }, { passive: true });

      stackEl.addEventListener('touchend', () => {
        if (!active) return;
        active = false;
        const threshold = window.innerWidth * 0.28;

        if (undoMode && undoCard) {
          if (moveX > threshold) {
            // Complete undo — snap to base position
            history.pop();
            const idx = cards.indexOf(undoCard);
            if (idx !== -1) cards.splice(idx, 1);
            cards.unshift(undoCard);
            const undoRot = parseFloat(undoCard.dataset.rot || 0);
            const undoY   = parseFloat(undoCard.dataset.baseY || 0);
            undoCard.style.transition = 'transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94)';
            undoCard.style.transform  = `translate3d(0,${undoY}px,0) rotate(${undoRot}deg)`;
            undoCard.style.zIndex     = cards.length;
            positionAll(false);
          } else {
            // Snap undo card back off-screen
            const offscreen = -(window.innerWidth * 1.2);
            const undoRot = parseFloat(undoCard.dataset.rot || 0);
            undoCard.style.transition = 'transform 0.4s cubic-bezier(0.55,0,1,0.45), opacity 0.3s ease';
            undoCard.style.transform  = `translate3d(${offscreen}px,0,0) rotate(${undoRot - 22}deg)`;
            undoCard.style.opacity    = '0';
            setTimeout(() => {
              undoCard.style.opacity = cards.indexOf(undoCard) < VISIBLE ? '1' : '0';
              positionAll(false);
            }, 420);
            if (cards[0]) {
              cards[0].style.transition = 'none';
            }
          }

        } else if (!undoMode && Math.abs(moveX) > threshold && moveX < 0) {
          // LEFT swipe — remove top card (only if more than 1 card left)
          if (cards.length <= 1 && history.length === 0) {
            // Truly at end — snap back
            const snapRot = parseFloat(cards[0].dataset.rot || 0);
            const snapY   = parseFloat(cards[0].dataset.baseY || 0);
            cards[0].style.transition = 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)';
            cards[0].style.transform  = `translate3d(0,${snapY}px,0) rotate(${snapRot}deg)`;
            return;
          } else if (cards.length <= 1) {
            // Last card — allow right-swipe (undo) but not left
            const snapRot = parseFloat(cards[0].dataset.rot || 0);
            const snapY   = parseFloat(cards[0].dataset.baseY || 0);
            cards[0].style.transition = 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)';
            cards[0].style.transform  = `translate3d(0,${snapY}px,0) rotate(${snapRot}deg)`;
            return;
          }
          const top = cards[0];
          const baseRot = parseFloat(top.dataset.rot || 0);
          const baseY   = parseFloat(top.dataset.baseY || 0);
          top.style.transition = 'transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.35s ease';
          top.style.transform  = `translate3d(-120vw,(${baseY}px) rotate(${baseRot - 22}deg)`;
          top.style.opacity    = '0';
          cards.shift();
          // Do NOT push to bottom — card is gone from stack
          history.push(top);
          positionAll(false);

        } else {
          // Snap back to base position
          const snapRot = parseFloat(cards[0].dataset.rot || 0);
          const snapY   = parseFloat(cards[0].dataset.baseY || 0);
          cards[0].style.transition = 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)';
          cards[0].style.transform  = `translate3d(0,${snapY}px,0) rotate(${snapRot}deg)`;
          positionAll(false);
        }
      }, { passive: true });
    }

    function makeDraggable(wrap, inner) {
      let sx, sy, sl, st, dragging = false;

      function dn(x, y) {
        dragging = true; sx = x; sy = y;
        sl = parseInt(wrap.style.left) || 0;
        st = parseInt(wrap.style.top)  || 0;
        toFront(wrap);
        inner.classList.add('lifted');
        /* freeze animation so dragging is instant */
        inner.style.animationPlayState = 'paused';
        inner.style.opacity = '1';
      }
      function mv(x, y) {
        if (!dragging) return;
        wrap.style.left = (sl + x - sx) + 'px';
        wrap.style.top  = (st + y - sy) + 'px';
      }
      function up() { dragging = false; inner.classList.remove('lifted'); saveLayout(); }

      wrap.addEventListener('mousedown', e => { e.preventDefault(); dn(e.clientX, e.clientY); });
      window.addEventListener('mousemove', e => mv(e.clientX, e.clientY));
      window.addEventListener('mouseup', up);
      wrap.addEventListener('touchstart', e => { const t = e.touches[0]; dn(t.clientX, t.clientY); }, { passive: true });
      window.addEventListener('touchmove', e => { if (!dragging) return; const t = e.touches[0]; mv(t.clientX, t.clientY); }, { passive: true });
      window.addEventListener('touchend', up);
    }
  </script>
</body>
